{% set name = "mpl_table" %}
{% set version = "0.1.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mpl_table-{{ version }}.tar.gz
  sha256: 5dea25d4f964b7ff768c54cd588cd8f758721a82b30843e1dc30aad392b2b566

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
    - poetry-core >=1.0.0
  run:
    - python >={{ python_min }},<4.0
    - matplotlib-base >=3.4.3,<4.0.0
    - pandas >=1.3.4,<2.0.0

test:
  imports:
    - mpl_table
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/geo7/mpl_table
  summary: Create custom table using matplotlib.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ocefpaf
